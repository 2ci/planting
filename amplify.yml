version: 1
frontend:
  phases:
    install:
      commands:
        - wget https://github.com/gohugoio/hugo/releases/download/v0.140.0/hugo_extended_0.140.0_Linux-64bit.tar.gz
        - tar -xf hugo_extended_0.140.0_Linux-64bit.tar.gz
        - mv hugo /usr/local/bin/
    build:
      commands:
        - hugo
  artifacts:
    baseDirectory: public
    files:
      - '**/*'
  cache:
    paths:
      - resources/***